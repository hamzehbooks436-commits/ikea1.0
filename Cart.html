<!DOCTYPE html>
<html>
<head>
    <title>IKEA - Cart</title>

    <style>
        body {
            background-color: #fffff0;
        }

        .myDiv {
            border: 1px outset white;
            background-color: white;
            text-align: center;
            width: 800px;
            margin: auto;
        }

        .logo {
            width: 400px;
        }

        .icon {
            width: 65px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ccc;
        }

        img {
            width: 80px;
        }

        button {
            padding: 6px 10px;
            cursor: pointer;
        }

        .total {
            font-weight: bold;
        }
    </style>
</head>

<body> <font size="5">

<div class="myDiv">

    <a href="index.html">
        <img src="logo.gif" class="logo">
    </a>

    <a href="Cart.html">
        <img src="Cart.gif" class="icon">
    </a>

    <a href="login.html">
        <img src="acc.gif" class="icon">
    </a>

    <a href="account.html">
        <img src="ikeabook.gif" class="icon">
    </a>

    <br><br>

    <a href="newproducts.html">New Products</a>
    <a href="livingroom.html">Living Room</a>
    <a href="Kitchen.html">Kitchen</a>
    <a href="Bedroom.html">Bedroom</a>
    <a href="Childrenroom.html">Children's Room</a>
    <a href="Outdoors.html">Outdoors</a>
    <a href="Office.html">Office</a>

    <br><br>

    <h2>Your Shopping Cart</h2>

    <table id="cartTable">

        <tr>
            <th>Product</th>
            <th>Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Remove</th>
        </tr>

    </table>

    <h3 id="total" data-usd-price="0" data-price-prefix="Total: ">Total: $0.00</h3>

    <br>

    <button onclick="placeOrder()">Place Order</button>

    <br><br>

    <a href="index.html">← Continue Shopping</a>

    <hr>

    <p>
        © 2026 IKEA |
        <a href="Cu.html">Contact Us</a> |
        <a href="pp.html">Privacy Policy</a>
    </p>

</div>

<script src="currency.js"></script>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function getItemUsdPrice(item) {
    let oldPrice = String(item.price || "").replace(/[^0-9.]/g, "");
    return Number(item.usdPrice || oldPrice || 0);
}

function loadCart() {
    let table = document.getElementById("cartTable");
    let total = 0;

    // clear rows except header
    table.innerHTML = `
        <tr>
            <th>Product</th>
            <th>Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Remove</th>
        </tr>
    `;

    cart.forEach((item, index) => {
        let usdPrice = getItemUsdPrice(item);
        total += usdPrice * item.qty;

        table.innerHTML += `
            <tr>
                <td><img src="${item.image}"></td>
                <td>${item.name}</td>
                <td data-usd-price="${usdPrice}">${formatCurrency(usdPrice)}</td>
                <td>${item.qty}</td>
                <td><button onclick="removeItem(${index})">Remove</button></td>
            </tr>
        `;
    });

    document.getElementById("total").setAttribute("data-usd-price", total.toFixed(2));
    document.getElementById("total").innerText = "Total: " + formatCurrency(total);
    applyCurrency();
}

function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

function placeOrder() {
    if (cart.length === 0) {
        alert("Your cart is empty!");
        return;
    }

    window.location.href = "deliveryform.html";
}

loadCart();

</script>

</body>
</html>
