<!DOCTYPE html>
<html>
<head>
    <title>IKEA - Account</title>

    <style>
        body {
            background-color: #fffff0;
        }

        .myDiv {
            border: 1px outset white;
            background-color: white;
            text-align: center;
            width: 800px;
            margin: auto;
        }

        .logo {
            width: 400px;
        }

        .icon {
            width: 65px;
        }

        button {
            padding: 8px 14px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="myDiv">

    <a href="index.html">
        <img src="logo.gif" class="logo">
    </a>

    <a href="Cart.html">
        <img src="Cart.gif" class="icon">
    </a>

    <a href="login.html">
        <img src="acc.gif" class="icon">
    </a>

    <a href="account.html">
        <img src="ikeabook.gif" class="icon">
    </a>

    <br><br>

    <h2>My Account</h2>

    <p id="accountMessage"></p>

    <button onclick="logout()">Log Out</button>

    <br><br>

    <a href="index.html">&larr; Return to Home</a>

    <hr>

    <p>
        &copy; 2026 IKEA |
        <a href="Cu.html">Contact Us</a> |
        <a href="pp.html">Privacy Policy</a>
    </p>

</div>

<script src="currency.js"></script>

<script>
let currentUser = localStorage.getItem("currentUser");

if (!currentUser) {
    window.location.href = "login.html";
} else {
    document.getElementById("accountMessage").innerText = "Welcome, " + currentUser + "!";
}

function logout() {
    localStorage.removeItem("currentUser");
    localStorage.setItem("adminLoggedIn", "no");
    window.location.href = "index.html";
}
</script>

</body>
</html>
